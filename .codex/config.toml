model = "gpt-5.3-codex"
model_reasoning_effort = "medium"

[windows]
sandbox = "elevated"

[mcp_servers.unityMCP]
command = "C:\\Python311\\Scripts\\uvx.exe"
args = [ "--offline", "--from", "mcpforunityserver==9.6.2", "mcp-for-unity", "--transport", "stdio" ]
startup_timeout_sec = 60
env = { SystemRoot = "C:\\Windows" }

[mcp_servers.code-review-graph]
command = "uvx"
args = [ "code-review-graph", "serve" ]
type = "stdio"

[mcp_servers.bridge-mcp-server]
command = "node"
args = [ "mcp//dist//index.js" ]
type = "stdio"

[features]
rmcp_client = true

[projects."H:\\Vinayak_Project\\WorkProjectBridge\\codex-aider-bridge-app"]
